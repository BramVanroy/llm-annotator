fail_fast: true

repos:
  - repo: local
    hooks:
      - id: make-quality
        name: Run make quality
        entry: make quality
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]

      - id: check-docs-build
        name: Check documentation builds
        entry: bash -c 'cd docs && python -m sphinx -b html . _build/html'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^(docs/|src/llm_annotator/.*\.py$)

