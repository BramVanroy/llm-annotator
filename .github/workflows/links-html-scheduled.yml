name: Docs links (HTML Scheduled)

on:
  schedule:
    - cron: "20 4 * * 1"
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  links:
    name: Check Live HTML links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Restore lychee cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: .lycheecache
          key: cache-lychee-html-${{ github.sha }}
          restore-keys: cache-lychee-html-

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail: true
          # We don't use .lychee.toml here unless you also keep a copy of it on the gh-pages branch.
          # --root-dir resolves root-relative links (e.g. /llm-annotator/latest/...) against the checkout.
          # 404.html uses absolute links prefixed with the site base URL (/llm-annotator/) which
          # cannot be resolved locally, so we exclude it.
          # overrides/ contains Jinja2 template files (.html) with raw template expressions,
          # not rendered HTML, so we exclude those too.
          args: >-
            --cache
            --no-progress
            --root-dir ${{ github.workspace }}
            --exclude-path '404\.html'
            --exclude-path 'overrides/'
            '**/*.html'

      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .lycheecache
          key: ${{ steps.restore-cache.outputs.cache-primary-key || format('cache-lychee-html-{0}', github.sha) }}

      - name: Create issue from file if failed
        if: env.lychee_exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Link checker report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
